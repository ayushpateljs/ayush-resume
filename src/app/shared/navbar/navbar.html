<nav class="navbar fixed-top custom-nav">
  <div class="container d-flex justify-content-between align-items-center">

    <!-- LOGO -->
    <a class="navbar-brand logo" routerLink="/">AP</a>

    <!-- DESKTOP MENU -->
    <ul class="desktop-menu d-none d-lg-flex gap-4 mee">
      <li><a routerLink="/about" class="nav-link">About</a></li>
      <li><a routerLink="/projects" class="nav-link">Projects</a></li>
      <li><a routerLink="/blog" class="nav-link">Blog</a></li>
      <li><a routerLink="/ai-skills" class="nav-link">AI & Skills</a></li>
      <li><a routerLink="/ressume" class="nav-link">Resume</a></li>
      <li><a routerLink="/contact" class="nav-link">Contact</a></li>
    </ul>

    <!-- RIGHT SIDE -->
    <div class="d-flex align-items-center gap-2">

      <button class="theme-btn" (click)="toggleTheme()">☀️</button>

      <button class="btn hire-btn d-none d-md-block">Hire Me</button>

      <!-- MOBILE TOGGLE -->
      <button class="menu-btn d-lg-none" (click)="toggleMenu()">
        <span [class.open]="menuOpen"></span>
      </button>

    </div>
  </div>

  <!-- MOBILE MENU -->
  <div class="mobile-menu d-lg-none" [class.show]="menuOpen">
    <a routerLink="/about" (click)="closeMenu()">About</a>
    <a routerLink="/projects" (click)="closeMenu()">Projects</a>
    <a routerLink="/blog" (click)="closeMenu()">Blog</a>
    <a routerLink="/ai-skills" (click)="closeMenu()">AI & Skills</a>
    <a routerLink="/ressume" (click)="closeMenu()">Resume</a>
    <a routerLink="/contact" (click)="closeMenu()">Contact</a>

    <button class="btn hire-btn w-100 mt-3">Hire Me</button>

  </div>
</nav>
