 <div class="container mt-5 pt-5">
    <h2 class="text-center mb-4">Skills</h2>

    <div class="row">
      @for (s of skills; track s.name) {
        <div class="col-md-4 mb-4">
          <div class="card-glass">
            <h5>{{ s.name }}</h5>
            <p>{{ s.desc }}</p>
          </div>
        </div>
      }
    </div>
  </div>
